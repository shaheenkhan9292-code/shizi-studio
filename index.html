<style>
        :root { 
            --accent: #00f2ff; 
            --bg: #050505; 
            --glass: rgba(255, 255, 255, 0.03); 
            --border: rgba(255, 255, 255, 0.1); 
        }

        /* 1. THE DARK NEON BACKGROUND */
        body { 
            margin: 0; 
            background: radial-gradient(circle at top, #0a1a1c 0%, #050505 100%);
            color: white; 
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* 2. THE GLASS NAVIGATION */
        nav { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 50px; border-bottom: 1px solid var(--border); z-index: 100;
        }
        .nav-logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        /* 3. THE "SHIZI" 3D PANEL (BETTER THAN VIZZY) */
        .panel-3d { 
            width: 100%; max-width: 700px; height: 350px; 
            background: var(--glass); 
            border: 1px solid var(--border); border-radius: 40px; 
            display: flex; justify-content: center; align-items: center; 
            margin: 100px auto 40px; 
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: 0.5s;
            cursor: pointer;
        }
        .panel-3d:hover {
            transform: translateY(-10px) rotateX(5deg);
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }
        .panel-3d h2 { font-size: 6rem; font-weight: 900; letter-spacing: -5px; }

        /* 4. THE GLOWING DOWNLOAD BUTTONS */
        .btn { 
            background: white; color: black; border: none; 
            padding: 15px 30px; border-radius: 12px; 
            font-weight: 800; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 0px var(--accent);
        }
        .btn:hover { 
            background: var(--accent); 
            box-shadow: 0 0 25px var(--accent); 
            transform: scale(1.05); 
        }
    </style>
