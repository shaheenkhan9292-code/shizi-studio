<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIZI STUDIO | Elite Audio Visualizer</title>
    
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #010101; 
            --glass: rgba(255, 255, 255, 0.02); 
            --glass-border: rgba(255, 255, 255, 0.07); 
        }

        /* ULTRA-AESTHETIC ANIMATED BACKGROUND */
        body { 
            margin: 0; 
            background: radial-gradient(circle at 50% 50%, #081a1c 0%, #010101 100%);
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-x: hidden;
            min-height: 100vh;
            perspective: 2000px;
        }

        /* THE FLOATING NEON GRID EFFECT */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(60deg) translateY(-200px);
            opacity: 0.2;
            z-index: -1;
        }

        * { box-sizing: border-box; transition: all 0.7s cubic-bezier(0.15, 0.85, 0.35, 1); font-family: 'Inter', 'Syncopate', sans-serif; }

        /* NEON NAVIGATION */
        nav { 
            position: fixed; top: 0; width: 100%; height: 80px; 
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(30px); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 80px; border-bottom: 1px solid var(--glass-border); z-index: 9999; 
        }
        .nav-logo { font-weight: 900; font-size: 1.8rem; letter-spacing: -3px; cursor: pointer; text-transform: uppercase; }
        .nav-logo span { color: var(--accent); text-shadow: 0 0 20px var(--accent); }
        .nav-links { display: flex; gap: 50px; }
        .nav-links a { text-decoration: none; color: #444; font-size: 0.75rem; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .nav-links a.active { color: white; text-shadow: 0 0 10px white; }
        .donate-btn { color: var(--accent) !important; border: 1px solid var(--accent); padding: 10px 25px !important; border-radius: 2px; transition: 0.3s; }
        .donate-btn:hover { background: var(--accent); color: black !important; box-shadow: 0 0 30px var(--accent); }

        /* TABS */
        .tab-view { display: none; width: 100%; padding: 160px 20px 80px; flex-direction: column; align-items: center; }
        .tab-view.active { display: flex; animation: reveal 1s ease-out; }
        @keyframes reveal { from { opacity: 0; filter: blur(20px); transform: scale(1.1); } to { opacity: 1; filter: blur(0); transform: scale(1); } }

        /* THE "BETTER THAN VIZZY" 3D PANEL */
        .panel-wrapper { position: relative; width: 100%; max-width: 800px; height: 450px; margin: 40px 0; cursor: pointer; }
        .panel-3d { 
            width: 100%; height: 100%; 
            background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(0,0,0,0.8));
            border: 1px solid var(--glass-border); border-radius: 20px; 
            display: flex; justify-content: center; align-items: center; 
            backdrop-filter: blur(20px);
            transform-style: preserve-3d;
            transform: rotateY(-20deg) rotateX(10deg);
        }
        .panel-wrapper:hover .panel-3d {
            transform: rotateY(20deg) rotateX(5deg);
            border-color: var(--accent);
            box-shadow: -30px 30px 100px rgba(0, 242, 255, 0.15);
        }
        .panel-3d h2 { 
            font-size: 8rem; color: white; margin: 0; font-weight: 900; letter-spacing: -8px;
            transform: translateZ(100px); /* Massive depth effect */
            text-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* CYBER DOWNLOAD CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; width: 100%; max-width: 1100px; }
        .card { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 60px; border-radius: 15px; text-align: center; 
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent));
            animation: lineFlow 3s infinite;
        }
        @keyframes lineFlow { to { left: 100%; } }
        
        .btn { 
            background: white; color: black; border: none; padding: 22px; 
            width: 100%; border-radius: 4px; font-weight: 900; cursor: pointer; 
            font-size: 0.8rem; text-transform: uppercase; margin-top: 25px; letter-spacing: 2px;
        }
        .btn:hover { background: var(--accent); letter-spacing: 4px; box-shadow: 0 0 40px var(--accent); }

        /* FUNCTIONAL STUDIO BOX */
        .studio-box { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 60px; border-radius: 20px; width: 100%; max-width: 600px; 
            text-align: center; backdrop-filter: blur(40px);
        }
        .color-dot { width: 35px; height: 35px; border-radius: 2px; cursor: pointer; display: inline-block; margin: 0 12px; border: 1px solid #333; }
        .color-dot.active { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); transform: scale(1.2); }
        
        input[type="file"] { 
            margin-top: 40px; width: 100%; padding: 20px; 
            background: black; color: var(--accent); border: 1px solid #222; 
            font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo" onclick="toggleTab('home')">SHIZI<span>STUDIO</span></div>
        <div class="nav-links">
            <a id="link-home" class="active" onclick="toggleTab('home')">// HOME</a>
            <a id="link-studio" onclick="toggleTab('studio')">// WORKSTATION</a>
            <a class="donate-btn" onclick="alert('Victory High Five! 🖐️')">SUPPORT</a>
        </div>
    </nav>

    <div id="home" class="tab-view active">
        <h1 style="font-size: 0.8rem; color: var(--accent); letter-spacing: 8px; margin-bottom: 0;">CORE_SYSTEM_OS</h1>
        <div class="panel-wrapper" onclick="toggleTab('studio')">
            <div class="panel-3d">
                <h2>SHIZI</h2>
            </div>
        </div>
        <div class="grid">
            <div class="card">
                <p style="color: #333; font-size: 0.7rem; font-weight: 900; letter-spacing: 3px;">WIN_X64_RELEASE</p>
                <button class="btn" onclick="triggerDownload('exe')">Get Shizi .EXE</button>
            </div>
            <div class="card">
                <p style="color: #333; font-size: 0.7rem; font-weight: 900; letter-spacing: 3px;">MAC_ARM_RELEASE</p>
                <button class="btn" onclick="triggerDownload('dmg')">Get Shizi .DMG</button>
            </div>
        </div>
    </div>

    <div id="studio" class="tab-view">
        <div class="studio-box">
            <h2 style="letter-spacing: -2px; font-size: 2.5rem;">INTERFACE CONFIG</h2>
            <div style="margin: 40px 0;">
                <div class="color-dot active" style="background: #00f2ff;" onclick="changeColor('#00f2ff', this)"></div>
                <div class="color-dot" style="background: #ffcc00;" onclick="changeColor('#ffcc00', this)"></div>
                <div class="color-dot" style="background: #ff0070;" onclick="changeColor('#ff0070', this)"></div>
                <div class="color-dot" style="background: #a200ff;" onclick="changeColor('#a200ff', this)"></div>
            </div>
            <p style="color: #444; font-size: 0.7rem; letter-spacing: 2px;">LOAD AUDIO STREAM (.MP3 / .WAV)</p>
            <input type="file" id="audioUpload" accept="audio/*">
        </div>
    </div>

    <script>
        function toggleTab(id) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-links a').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('link-' + id).classList.add('active');
        }

        function changeColor(c, el) {
            document.documentElement.style.setProperty('--accent', c);
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function triggerDownload(type) {
            let url = (type === 'exe') 
                ? "https://github.com/Shaharyar-Khan/shizi-studio/releases/download/v1.0/shizi.exe" 
                : "https://github.com/Shaharyar-Khan/shizi-studio/releases/download/v1.0/shizi.dmg";
            
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', '');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
