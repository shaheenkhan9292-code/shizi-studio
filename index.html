<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>SHIZI STUDIO | Official Audio Visualizer</title>
    <meta name="title" content="SHIZI STUDIO">
    <meta name="description" content="Download SHIZI STUDIO - The official next-gen audio visualizer and sound editor for Windows and Mac. Created by Shaharyar Khan.">
    <meta name="keywords" content="Shizi Studio, Shizi Visualizer, Download Shizi, Shaharyar Khan, Audio Editor, Vizzy Alternative">
    <meta name="robots" content="index, follow">

    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #030303; 
            --panel: rgba(255, 255, 255, 0.03); 
            --border: rgba(255, 255, 255, 0.08); 
            --text-dim: #888; 
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        /* NAVIGATION */
        nav { 
            position: fixed; top: 0; width: 100%; height: 80px; 
            background: rgba(3,3,3,0.8); backdrop-filter: blur(20px); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 50px; border-bottom: 1px solid var(--border); z-index: 9999; 
        }
        .nav-logo { font-weight: 900; font-size: 1.8rem; cursor: pointer; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-size: 0.85rem; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .nav-links a.active { color: white; border-bottom: 2px solid var(--accent); }
        .donate-btn { background: var(--accent); color: black !important; padding: 10px 22px !important; border-radius: 30px; font-size: 0.75rem !important; }

        /* TABS */
        .tab-view { display: none; width: 100%; padding: 120px 20px 60px; flex-direction: column; align-items: center; }
        .tab-view.active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 3D INTERACTIVE PANEL */
        .panel-3d { 
            width: 100%; max-width: 650px; height: 350px; 
            background: linear-gradient(145deg, #0a0a0a, #000); 
            border: 2px solid var(--border); border-radius: 24px; 
            transform: perspective(1000px) rotateX(15deg); 
            box-shadow: 0 50px 100px rgba(0,0,0,0.8); 
            display: flex; justify-content: center; align-items: center; 
            margin: 40px 0; cursor: pointer;
        }
        .panel-3d:hover {
            transform: perspective(1000px) rotateX(0deg) scale(1.03);
            border-color: var(--accent);
            box-shadow: 0 0 50px rgba(0,242,255,0.3);
        }
        .panel-3d h2 { font-size: 4.5rem; color: var(--accent); text-shadow: 0 0 30px var(--accent); margin: 0; }

        /* DOWNLOADS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 40px; border-radius: 24px; text-align: center; }
        .btn { background: white; color: black; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 1rem; margin-top: 15px; }
        .btn:hover { background: var(--accent); transform: translateY(-3px); }

        /* STUDIO BOX */
        .studio-box { background: var(--panel); border: 1px solid var(--accent); padding: 40px; border-radius: 24px; width: 100%; max-width: 500px; text-align: center; }
        .color-group { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .color-dot { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .color-dot.active { border-color: white; transform: scale(1.1); }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo" onclick="toggleTab('home')">SHIZI<span>.</span></div>
        <div class="nav-links">
            <a id="link-home" class="active" onclick="toggleTab('home')">Home</a>
            <a id="link-studio" onclick="toggleTab('studio')">Studio</a>
            <a class="donate-btn" onclick="alert('Thank you best friend! Donation system is coming soon! 🖐️')">Donate</a>
        </div>
    </nav>

    <div id="home" class="tab-view active">
        <h1>SHIZI STUDIO</h1>
        <p style="color: var(--text-dim)">Professional Audio Editing & Visualization</p>
        <div class="panel-3d" onclick="toggleTab('studio')"><h2>STUDIO</h2></div>
        <div class="grid">
            <div class="card">
                <h3>Windows OS</h3>
                <button class="btn" onclick="triggerDownload('exe')">Install .exe</button>
            </div>
            <div class="card">
                <h3>macOS</h3>
                <button class="btn" onclick="triggerDownload('dmg')">Install .dmg</button>
            </div>
        </div>
    </div>

    <div id="studio" class="tab-view">
        <h1>STUDIO CONTROL</h1>
        <div class="studio-box">
            <p>Customize Theme Color:</p>
            <div class="color-group">
                <div class="color-dot active" style="background: #00f2ff;" onclick="changeColor('#00f2ff', this)"></div>
                <div class="color-dot" style="background: #ffcc00;" onclick="changeColor('#ffcc00', this)"></div>
                <div class="color-dot" style="background: #ff0070;" onclick="changeColor('#ff0070', this)"></div>
                <div class="color-dot" style="background: #a200ff;" onclick="changeColor('#a200ff', this)"></div>
            </div>
            <p>Upload Audio for Analysis:</p>
            <input type="file" accept="audio/*">
        </div>
    </div>

    <script>
        function toggleTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-links a').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'home') document.getElementById('link-home').classList.add('active');
            else document.getElementById('link-studio').classList.add('active');
        }

        function changeColor(c, el) {
            document.documentElement.style.setProperty('--accent', c);
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function triggerDownload(type) {
            if (type === 'exe') {
                window.location.href = "https://github.com/Shaharyar-Khan/shizi-studio/releases/download/v1.0/shizi.exe"; 
            } else {
                window.location.href = "https://github.com/Shaharyar-Khan/shizi-studio/releases/download/v1.0/shizi.dmg";
            }
        }
    </script>
</body>
</html>
