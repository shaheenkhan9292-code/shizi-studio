<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoEdit | Cinematic Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        
        /* THE "MORE GOOD" BACKGROUND */
        body { 
            margin: 0;
            background: #020617;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            color: #f8fafc;
        }

        /* Animated Mesh Gradient Layer */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(76, 29, 149, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(30, 58, 138, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(88, 28, 135, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(15, 23, 42, 1) 0px, transparent 50%);
            animation: mesh-move 20s ease infinite alternate;
        }

        @keyframes mesh-move {
            0% { transform: scale(1); }
            100% { transform: scale(1.1) rotate(1deg); }
        }

        /* Neon Border Glow for the Main Screen */
        .preview-glow {
            position: relative;
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.1), inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* Frosted Glass Panels */
        .frosted {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .active-tab {
            background: linear-gradient(90deg, #8b5cf6, #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 2px solid #8b5cf6;
        }
    </style>
</head>
<body class="flex flex-col">
    <div class="mesh-bg"></div>

    <nav class="h-16 flex items-center justify-between px-8 frosted z-10">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-lg rotate-12 flex items-center justify-center font-black shadow-[0_0_20px_rgba(168,85,247,0.4)]">N</div>
            <span class="text-xl font-black tracking-tighter uppercase">Neo<span class="text-violet-400">Edit</span></span>
        </div>
        <div class="flex gap-8 text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">
            <span class="active-tab cursor-pointer">Editor</span>
            <span class="hover:text-white cursor-pointer transition">Library</span>
            <span class="hover:text-white cursor-pointer transition">Export</span>
        </div>
        <button class="bg-white text-black px-8 py-2 rounded-full text-xs font-black hover:shadow-[0_0_25px_rgba(255,255,255,0.3)] transition-all active:scale-95">
            RENDER 4K
        </button>
    </nav>

    <main class="flex-1 flex p-4 gap-4 overflow-hidden">
        <aside class="w-20 frosted rounded-3xl flex flex-col items-center py-6 gap-6">
            <div class="text-xl opacity-50 hover:opacity-100 cursor-pointer transition">📁</div>
            <div class="text-xl opacity-100 text-violet-400 cursor-pointer transition">✂️</div>
            <div class="text-xl opacity-50 hover:opacity-100 cursor-pointer transition">🎵</div>
            <div class="text-xl opacity-50 hover:opacity-100 cursor-pointer transition">🪄</div>
        </aside>

        <div class="flex-1 flex flex-col gap-4">
            <div class="flex-1 rounded-[2.5rem] bg-black/40 preview-glow overflow-hidden flex items-center justify-center relative border border-white/5">
                <div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-violet-950/20"></div>
                <div class="text-center">
                    <p class="text-6xl font-black text-white/5 italic">MASTER CANVAS</p>
                    <div class="mt-8 flex gap-4 justify-center">
                        <button class="w-14 h-14 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition">⏮</button>
                        <button class="w-20 h-20 rounded-full bg-violet-600 shadow-[0_0_30px_rgba(139,92,246,0.6)] flex items-center justify-center text-3xl hover:scale-105 transition">▶</button>
                        <button class="w-14 h-14 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition">⏭</button>
                    </div>
                </div>
            </div>

            <footer class="h-64 frosted rounded-[2.5rem] p-6 relative flex flex-col overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-bold text-slate-500 tracking-[0.3em] uppercase">Multi-Track Session</span>
                    <span class="font-mono text-violet-400 font-bold">00:04:12:08</span>
                </div>
                <div class="flex-1 space-y-3 overflow-y-auto pr-2">
                    <div class="h-12 bg-white/5 rounded-2xl border border-white/5 flex items-center px-4 relative overflow-hidden">
                        <div class="absolute left-10 w-1/3 h-8 bg-gradient-to-r from-violet-600 to-indigo-600 rounded-lg shadow-lg border border-white/10"></div>
                        <div class="absolute left-[50%] w-1/4 h-8 bg-gradient-to-r from-fuchsia-600 to-pink-600 rounded-lg shadow-lg border border-white/10"></div>
                    </div>
                    <div class="h-12 bg-white/5 rounded-2xl border border-white/5 flex items-center px-4">
                        <div class="w-full h-4 bg-emerald-500/20 border border-emerald-500/30 rounded-full overflow-hidden">
                             <div class="h-full w-2/3 bg-emerald-500/40"></div>
                        </div>
                    </div>
                </div>
            </footer>
        </div>

        <aside class="w-80 frosted rounded-[2.5rem] p-8">
            <h3 class="text-xs font-black uppercase tracking-[0.2em] mb-10 text-slate-500 text-center">Properties</h3>
            <div class="space-y-8">
                <div class="space-y-4">
                    <div class="flex justify-between text-xs font-bold"><span>Scale</span><span class="text-violet-400">1.5x</span></div>
                    <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden"><div class="h-full w-[65%] bg-violet-500 shadow-[0_0_10px_#8b5cf6]"></div></div>
                </div>
                <div class="space-y-4">
                    <div class="flex justify-between text-xs font-bold"><span>Opacity</span><span class="text-violet-400">80%</span></div>
                    <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden"><div class="h-full w-[80%] bg-violet-500 shadow-[0_0_10px_#8b5cf6]"></div></div>
                </div>
            </div>
        </aside>
    </main>
</body>
</html>
