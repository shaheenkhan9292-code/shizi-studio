<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIZI STUDIO | Official</title>
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at top, #0a1a1c 0%, #050505 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            text-align: center;
            cursor: auto; /* Normal cursor is back! */
        }

        /* NAVIGATION */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 50px; border-bottom: 1px solid var(--border); z-index: 1000;
        }
        .nav-logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: #888; text-decoration: none; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .nav-links a.active, .nav-links a:hover { color: white; }

        /* HERO AREA */
        .container { display: none; padding-top: 120px; animation: fadeIn 0.5s ease-in; }
        .container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .panel-3d { 
            width: 90%; max-width: 800px; height: 350px; 
            background: var(--glass); border: 1px solid var(--border); 
            border-radius: 40px; display: flex; justify-content: center; 
            align-items: center; margin: 40px auto; 
            backdrop-filter: blur(15px); transition: 0.5s;
        }
        .panel-3d:hover { transform: translateY(-10px); border-color: var(--accent); }
        .shizi-text { font-size: 7rem; font-weight: 900; letter-spacing: -5px; text-shadow: 0 0 30px var(--accent); }

        /* INSTALL BUTTONS */
        .download-zone { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .btn { 
            background: white; color: black; border: none; 
            padding: 18px 40px; border-radius: 12px; 
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn.mac { background: transparent; border: 1px solid #444; color: white; }
        .btn:hover { background: var(--accent); color: black; box-shadow: 0 0 30px var(--accent); transform: scale(1.05); }

        /* STUDIO TAB */
        .studio-box {
            max-width: 900px; margin: 0 auto; background: var(--glass);
            padding: 50px; border-radius: 30px; border: 1px solid var(--border);
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px; text-align: left;
        }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; display: inline-block; cursor: pointer; margin-right: 10px; border: 2px solid transparent; }
        .color-dot.active { border-color: white; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">SHIZI <span>STUDIO</span></div>
        <div class="nav-links">
            <a onclick="showTab('home')" id="l-home" class="active">HOME</a>
            <a onclick="showTab('studio')" id="l-studio">STUDIO</a>
            <a onclick="showTab('donate')" id="l-donate">DONATE</a>
        </div>
    </nav>

    <div id="home" class="container active">
        <div class="panel-3d">
            <h1 class="shizi-text">SHIZI</h1>
        </div>
        <h1 style="font-size: 3rem;">Experience the Sound.</h1>
        <p style="color: #666; margin-top: 10px;">The world's most aesthetic 3D Audio Visualizer.</p>
        
        <div class="download-zone">
            <button class="btn" onclick="triggerDownload('exe')">INSTALL FOR WINDOWS (.EXE)</button>
            <button class="btn mac" onclick="triggerDownload('dmg')">INSTALL FOR MAC (.DMG)</button>
        </div>
    </div>

    <div id="studio" class="container">
        <div class="studio-box">
            <div>
                <h3>THEME COLOR</h3>
                <p style="color:#666; font-size: 0.8rem; margin-bottom: 15px;">Pick your studio accent.</p>
                <div class="color-dot active" style="background:#00f2ff" onclick="setAccent('#00f2ff', this)"></div>
                <div class="color-dot" style="background:#ff007b" onclick="setAccent('#ff007b', this)"></div>
                <div class="color-dot" style="background:#7000ff" onclick="setAccent('#7000ff', this)"></div>
            </div>
            <div style="border-left: 1px solid var(--border); padding-left: 40px;">
                <h3>LOAD AUDIO</h3>
                <button class="btn" style="padding: 10px 20px; margin-top: 20px;" onclick="document.getElementById('aud').click()">SELECT FILE</button>
                <input type="file" id="aud" style="display:none">
            </div>
        </div>
    </div>

    <div id="donate" class="container">
        <div style="background: var(--glass); padding: 80px; border-radius: 40px; display: inline-block;">
            <h2 style="color: var(--accent);">Support the Future</h2>
            <p style="color:#888; margin: 20px 0;">Fuel the development of Shizi Studio.</p>
            <button class="btn">DONATE NOW</button>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('l-' + id).classList.add('active');
        }

        function setAccent(color, el) {
            document.documentElement.style.setProperty('--accent', color);
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function triggerDownload(type) {
            let file = (type === 'exe') ? 'shizi.exe' : 'shizi.dmg';
            alert("Starting Download: " + file);
            window.location.href = "https://github.com/Shaharyar-Khan/shizi-studio/releases/latest/download/" + file;
        }
    </script>

</body>
</html>
