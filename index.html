<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIZI STUDIO | Beyond the Visual</title>
    <style>
        :root {
            --accent: #00f2ff;
            --purple: #7000ff;
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            cursor: crosshair;
        }

        /* 1. ANIMATED NEBULA BACKGROUND */
        .nebula {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            z-index: -1; filter: blur(60px);
        }

        /* 2. NAVIGATION */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 5%; background: rgba(5, 5, 5, 0.5);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.6rem; font-weight: 900; letter-spacing: -2px; }
        .logo span { color: var(--accent); text-shadow: 0 0 20px var(--accent); }

        /* 3. MAIN WORKSPACE */
        .workspace {
            display: grid; grid-template-columns: 350px 1fr;
            min-height: 90vh; padding: 40px; gap: 40px;
        }

        /* THE EDITOR SIDEBAR (Just like Vizzy) */
        .editor-panel {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 30px; padding: 30px; backdrop-filter: blur(30px);
            display: flex; flex-direction: column; gap: 20px;
        }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 0.7rem; color: #555; letter-spacing: 2px; margin-bottom: 10px; }
        
        .custom-input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            padding: 12px; border-radius: 10px; color: white; font-size: 0.9rem;
        }

        /* THE DISPLAY STAGE */
        .stage {
            background: rgba(0,0,0,0.4); border-radius: 40px;
            border: 1px solid var(--border); position: relative;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }
        
        .visualizer-ring {
            width: 300px; height: 300px; border: 2px solid var(--accent);
            border-radius: 50%; box-shadow: 0 0 50px var(--accent);
            animation: pulse 2s infinite alternate;
            display: flex; justify-content: center; align-items: center;
            font-weight: 900; font-size: 3rem; letter-spacing: 5px;
        }

        @keyframes pulse {
            from { transform: scale(1); box-shadow: 0 0 30px var(--accent); }
            to { transform: scale(1.1); box-shadow: 0 0 60px var(--purple); border-color: var(--purple); }
        }

        /* 4. TEMPLATE CARDS (3D HOVER) */
        .grid { display: flex; gap: 25px; padding: 0 40px 60px; overflow-x: auto; }
        .card {
            min-width: 280px; height: 180px; background: var(--glass);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; position: relative;
        }
        .card:hover { 
            transform: translateY(-15px) rotateX(10deg); 
            border-color: var(--accent); 
            background: rgba(255,255,255,0.05);
        }
        .card h3 { color: var(--accent); font-size: 0.9rem; margin-top: 100px; }

        /* BUTTONS */
        .btn-glow {
            padding: 15px 40px; border-radius: 50px; border: none;
            background: white; color: black; font-weight: 800;
            cursor: pointer; transition: 0.4s;
        }
        .btn-glow:hover { 
            background: var(--accent); 
            box-shadow: 0 0 40px var(--accent); 
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="nebula"></div>

    <nav>
        <div class="logo">SHIZI <span>STUDIO</span></div>
        <div style="display: flex; gap: 30px;">
            <button class="btn-glow" style="padding: 10px 25px; background: transparent; color: white; border: 1px solid #333;">Sign In</button>
            <button class="btn-glow" style="padding: 10px 25px;">Export App</button>
        </div>
    </nav>

    <div class="workspace">
        <div class="editor-panel">
            <div class="control-group">
                <label>PROJECT NAME</label>
                <input type="text" class="custom-input" value="Untiled_Visualizer" id="proj-name">
            </div>
            
            <div class="control-group">
                <label>ACCENT THEME</label>
                <div style="display: flex; gap: 10px;">
                    <div onclick="changeTheme('#00f2ff')" style="width:25px; height:25px; background:#00f2ff; border-radius:5px; cursor:pointer;"></div>
                    <div onclick="changeTheme('#ff007b')" style="width:25px; height:25px; background:#ff007b; border-radius:5px; cursor:pointer;"></div>
                    <div onclick="changeTheme('#a200ff')" style="width:25px; height:25px; background:#a200ff; border-radius:5px; cursor:pointer;"></div>
                </div>
            </div>

            <div class="control-group">
                <label>SENSITIVITY</label>
                <input type="range" style="width: 100%; accent-color: var(--accent);">
            </div>

            <button class="btn-glow" style="width: 100%; margin-top: auto;">RENDER VIDEO</button>
        </div>

        <div class="stage">
            <div class="visualizer-ring">SHIZI</div>
            <h1 style="margin-top: 40px; font-size: 3rem; letter-spacing: -2px;">Edit your Vision.</h1>
            <p style="color: #444; margin-top: 10px;">The world's first interactive 3D studio browser.</p>
        </div>
    </div>

    <h2 style="padding: 0 40px 20px; font-size: 1rem; color: #444; letter-spacing: 3px;">POPULAR_TEMPLATES</h2>
    <div class="grid">
        <div class="card"><h3>CYBER_PULSE</h3><p style="font-size: 0.7rem; color: #555;">Used by 4.2k artists</p></div>
        <div class="card"><h3>GHOST_WAVE</h3><p style="font-size: 0.7rem; color: #555;">Used by 1.1k artists</p></div>
        <div class="card"><h3>NEON_STORM</h3><p style="font-size: 0.7rem; color: #555;">Used by 8.5k artists</p></div>
        <div class="card"><h3>ORBITAL_REMIX</h3><p style="font-size: 0.7rem; color: #555;">Used by 2.3k artists</p></div>
    </div>

    <script>
        function changeTheme(color) {
            document.documentElement.style.setProperty('--accent', color);
        }

        // Add 3D Tilt effect to cards
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                let x = e.offsetX;
                let y = e.offsetY;
                let midX = card.offsetWidth / 2;
                let midY = card.offsetHeight / 2;
                card.style.transform = `perspective(500px) rotateX(${(y - midY) / 10}deg) rotateY(${(midX - x) / 10}deg) translateY(-10px)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(500px) rotateX(0deg) rotateY(0deg) translateY(0)`;
            });
        });
    </script>
</body>
</html>
